<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maquettes – Lash Boutique</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; }

    /* ── TAB BAR ── */
    .tab-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      display: flex; align-items: center;
      background: #0A0A0A; border-bottom: 1px solid #333;
      padding: 0 20px; height: 52px; gap: 8px;
    }
    .tab-bar span {
      color: #555; font-size: 0.75rem; letter-spacing: 1px;
      text-transform: uppercase; margin-right: 8px;
    }
    .tab-btn {
      padding: 8px 20px; border: 1px solid #333; background: transparent;
      color: #888; font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s; border-radius: 4px; font-family: sans-serif;
    }
    .tab-btn:hover { border-color: #666; color: #ccc; }
    .tab-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 700; }
    .tab-btn.t2.active { background: #E8A4B8; border-color: #E8A4B8; color: #fff; }
    .tab-btn.t3.active { background: #C4896F; border-color: #C4896F; color: #fff; }

    /* ── PANELS ── */
    .panel { display: none; padding-top: 52px; }
    .panel.active { display: block; }
    .panel iframe {
      width: 100%; height: calc(100vh - 52px);
      border: none; display: block;
    }
  </style>
</head>
<body>

<div class="tab-bar">
  <span>Maquettes :</span>
  <button class="tab-btn t1 active" onclick="show(1)">✨ 1 – Luxe & Or</button>
  <button class="tab-btn t2" onclick="show(2)">🌸 2 – Rosa Doux</button>
  <button class="tab-btn t3" onclick="show(3)">🖤 3 – Moderne & Chic</button>
</div>

<div class="panel active" id="p1">
  <iframe src="mockup-1-luxe.html"></iframe>
</div>
<div class="panel" id="p2">
  <iframe src="mockup-2-rose.html"></iframe>
</div>
<div class="panel" id="p3">
  <iframe src="mockup-3-moderne.html"></iframe>
</div>

<script>
  function show(n) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('p' + n).classList.add('active');
    document.querySelectorAll('.tab-btn')[n - 1].classList.add('active');
  }
</script>

</body>
</html>
